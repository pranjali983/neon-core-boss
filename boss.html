<!DOCTYPE html>
<html>
<head>
    <title>Neon Core Boss</title>
    <style>
        body { margin: 0; background: #050505; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; }
        .bar-container { width: 300px; height: 10px; border: 1px solid #fff; margin: 5px auto; }
        #boss-hp { width: 100%; height: 100%; background: #f00; transition: width 0.2s; }
    </style>
</head>
<body>
    <div id="ui">
        BOSS INTEGRITY
        <div class="bar-container"><div id="boss-hp"></div></div>
        SCORE: <span id="score">0</span>
    </div>
    <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hpBar = document.getElementById('boss-hp');

let w, h, mouseX, mouseY, clicking = false;
let score = 0, bossHp = 100, frame = 0;
let bullets = [], enemyBullets = [];

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mousedown', () => clicking = true);
window.addEventListener('mouseup', () => clicking = false);
resize();

class Bullet {
    constructor(x, y, vx, vy, color) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.color = color;
    }
    update() { this.x += this.vx; this.y += this.vy; }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, 3, 0, Math.PI*2); ctx.fill();
    }
}

function update() {
    frame++;
    ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
    ctx.fillRect(0, 0, w, h);

    // Draw Boss (The Core)
    const bossX = w/2 + Math.sin(frame * 0.02) * 100;
    const bossY = 150 + Math.cos(frame * 0.01) * 50;
    
    ctx.shadowBlur = 20; ctx.shadowColor = '#f0f';
    ctx.fillStyle = '#f0f';
    ctx.beginPath(); ctx.arc(bossX, bossY, 40, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Boss Attack Pattern (Every 10 frames)
    if (frame % 10 === 0) {
        let angleStep = (Math.PI * 2) / 12;
        let offset = frame * 0.05;
        for (let i = 0; i < 12; i++) {
            enemyBullets.push(new Bullet(bossX, bossY, Math.cos(angleStep * i + offset) * 4, Math.sin(angleStep * i + offset) * 4, '#ff0'));
        }
    }

    // Player Shooting
    if (clicking && frame % 5 === 0) {
        bullets.push(new Bullet(mouseX, mouseY - 20, 0, -10, '#0ff'));
    }

    // Update Player Bullets
    bullets.forEach((b, i) => {
        b.update(); b.draw();
        let d = Math.hypot(b.x - bossX, b.y - bossY);
        if (d < 40) {
            bullets.splice(i, 1);
            bossHp -= 0.5;
            score += 10;
            hpBar.style.width = bossHp + '%';
        }
        if (b.y < 0) bullets.splice(i, 1);
    });

    // Update Enemy Bullets
    enemyBullets.forEach((b, i) => {
        b.update(); b.draw();
        let d = Math.hypot(b.x - mouseX, b.y - mouseY);
        if (d < 15) {
            alert("SYSTEM FAILURE. Score: " + score);
            location.reload();
        }
        if (b.y > h || b.x < 0 || b.x > w) enemyBullets.splice(i, 1);
    });

    // Player Cursor
    ctx.strokeStyle = '#0ff';
    ctx.strokeRect(mouseX - 10, mouseY - 10, 20, 20);

    if (bossHp <= 0) {
        alert("BOSS DEFEATED! Final Score: " + score);
        location.reload();
    } else {
        document.getElementById('score').innerText = score;
        requestAnimationFrame(update);
    }
}

update();
</script>
</body>
</html>
